# https://wandb.ai

wandb:
  _target_: lightning.pytorch.loggers.wandb.WandbLogger
  mode: "online" # offline, online, disabled
  # offline: False
  name: "" # name of the run (normally generated by wandb if "")
  save_dir: "${paths.output_dir}"
  id: null # pass correct id to resume experiment! "jxo8bsj1"
  resume: "allow" # never, must, allow
  anonymous: null # enable anonymous logging
  project: "CatDiT"
  log_model: False # upload lightning ckpts
  prefix: "" # a string to put at the beginning of metric keys
  entity: "" # set to name of your wandb user/team
  group: ""
  tags: "${tags}"
  job_type: ""